version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: campaign_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaign_manager
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: campaign_manager_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: campaign_manager
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-in-production
      JWT_EXPIRES_IN: 7d
    ports:
      - '3001:3001'
    command: >
      sh -c "yarn db:migrate && yarn db:seed && yarn start"

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: campaign_manager_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_data:
